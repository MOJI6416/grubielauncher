name: Release Launcher

# Запуск вручную: Actions -> Release Launcher -> Run workflow.
# Версия релиза берётся из package.json, тег создаёт electron-builder.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build: npm run build:win -- --publish always
          - os: ubuntu-latest
            build: npm run build:linux -- --publish always

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        run: ${{ matrix.build }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
